sources:
  research-mysql-db:
    kind: mysql
    #url: ${DB_CONNECTION_STRING}
    #type: mysql
    host: ${DB_HOST}
    port: 3306
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    database: ${DB_NAME}

tools:
  start_research_session:
    kind: mysql-sql
    source: research-mysql-db
    statement: |
      INSERT INTO research_master (research_id, user_name, user_email, topic, access_link) VALUES (?, ?, ?, ?, ?);
    description: Use this tool first to register the user and start a new research session.
    parameters:
      - name: research_id
        type: string
        description: A unique 6-character alphanumeric ID generated by the agent.
      - name: user_name
        type: string
        description: The name of the user requesting the research.
      - name: user_email
        type: string
        description: The email address of the user.
      - name: topic
        type: string
        description: The topic of the research.
      - name: access_link
        type: string
        description: The generated access URL, e.g., https://my-research-portal.com/research/{research_id}

  save_academic_source:
    kind: mysql-sql
    source: research-mysql-db
    statement: |
      INSERT INTO research_sources (research_id, source_title, summary, link) VALUES (?, ?, ?, ?);
    description: Use this tool to save each academic source (arXiv, Semantic Scholar) found during the research.
    parameters:
      - name: research_id
        type: string
        description: The unique ID created in start_research_session.
      - name: source_title
        type: string
        description: The title of the academic source or paper.
      - name: summary
        type: string
        description: A brief summary or abstract of the academic source.
      - name: link
        type: string
        description: The URL link to the academic source.
        
  retrieve_research_session:
    kind: mysql-sql
    source: research-mysql-db
    statement: |
      SELECT r.topic, r.access_link, s.source_title, s.summary, s.link 
      FROM research_master r 
      LEFT JOIN research_sources s ON r.research_id = s.research_id 
      WHERE r.research_id = ? AND r.user_email = ?;
    description: Use this tool to retrieve a user's past research using their ID and email.
    parameters:
      - name: research_id
        type: string
        description: The unique 6-character ID of the past research.
      - name: user_email
        type: string
        description: The email address used to create the research.

toolsets:
  research_db_toolset:
    - start_research_session
    - save_academic_source
    - retrieve_research_session

